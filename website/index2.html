  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #f7faf7 0%, #eef7ee 100%);
      color: #1f2937;
    }
    .page {
      min-height: 100vh;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .page.active { display: flex; }
    .card {
      width: 100%;
      max-width: 760px;
      background: white;
      border-radius: 28px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.12);
      padding: 40px 24px;
      text-align: center;
    }
    .logo {
      width: min(260px, 80%);
      height: auto;
      display: block;
      margin: 0 auto;
    }
    .plus {
      font-size: 52px;
      font-weight: 700;
      color: #0f7a3b;
      margin: 12px 0;
    }
    h1 {
      font-size: clamp(28px, 4vw, 40px);
      margin: 20px 0 12px;
      line-height: 1.2;
    }
    p {
      font-size: 18px;
      line-height: 1.5;
      margin: 0;
    }
    .buttons {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: 28px;
    }
    button, .back {
      border: none;
      border-radius: 999px;
      padding: 14px 28px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }
    button:hover, .back:hover { transform: translateY(-2px); opacity: 0.95; }
    .yes { background: #138a3b; color: white; }
    .no { background: #ececec; color: #222; }
    .back {
      display: inline-block;
      text-decoration: none;
      margin-top: 28px;
      background: #ececec;
      color: #222;
    }
    .phone {
      font-size: clamp(26px, 5vw, 44px);
      font-weight: 800;
      color: #138a3b;
      margin-top: 16px;
      word-break: break-word;
    }
  </style>
