<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dennree & Taissir Deal?</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f9f4; /* Leichtes Grün im Hintergrund */
            text-align: center;
            overflow: hidden; /* Verhindert Scrollbalken, wenn der Button wegläuft */
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 90%;
            position: relative; /* Wichtig für die Positionierung des Containers */
        }
        .logos {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        .logos img {
            max-width: 250px;
            height: auto;
        }
        .plus {
            font-size: 3rem;
            font-weight: bold;
            color: #007a33; /* Dennree Grün */
            margin: 0;
        }
        p.question {
            font-size: 1.3rem;
            font-weight: bold;
            color: #333;
            margin-top: 30px;
            margin-bottom: 30px;
        }
        .buttons-container {
            position: relative;
            height: 60px; /* Platz für die Buttons reservieren */
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }
        button {
            padding: 12px 35px;
            font-size: 1.2rem;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            transition: background-color 0.2s, transform 0.1s;
        }
        .btn-ja {
            background-color: #007a33;
            color: white;
            transition: transform 0.2s, background-color 0.2s; /* Zusätzliche Transition für den Ja-Button */
        }
        .btn-ja:hover {
            background-color: #005c26;
            transform: scale(1.05); /* Nur der Ja-Button wird größer */
        }
        .btn-nein {
            background-color: #e0e0e0;
            color: #333;
            position: absolute; /* Ermöglicht das freie Bewegen */
            transition: left 0.2s ease, top 0.2s ease; /* Fügt eine glatte Bewegung hinzu */
        }
        /* Versteckt die Erfolgsseite am Anfang */
        #success-page {
            display: none;
        }
        #success-page h1 {
            color: #007a33;
            font-size: 2.2rem;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div id="main-page" class="container">
        <div class="logos">
            <img src="dennree.png" alt="Dennree Logo">
            <div class="plus">+</div>
            <img src="taissir.png" alt="Taissir Logo">
        </div>

        <p class="question">Dennree und Taissir, der größte Partnership-Deal in 2026?</p>

        <div class="buttons-container">
            <button class="btn-ja" onclick="showSuccess()">Ja</button>
            <button class="btn-nein" id="noButton">Nein</button>
        </div>
    </div>

    <div id="success-page" class="container">
        <h1>JAAAA, please call me 01631425323</h1>
        <p>📞 Ich warte auf den Anruf!</p>
    </div>

    <script>
        // Funktion, um zur zweiten Seite zu wechseln
        function showSuccess() {
            document.getElementById('main-page').style.display = 'none';
            document.getElementById('success-page').style.display = 'block';
        }

        // --- Die Weglauf-Logik für den Nein-Button ---
        const noButton = document.getElementById('noButton');

        noButton.addEventListener('mouseover', function() {
            // Berechnet die Größe des Viewports (Fensters)
            const viewportWidth = window.innerWidth;
            const viewportHeight = window.innerHeight;

            // Berechnet zufällige neue Koordinaten innerhalb des Fensters, aber mit Abstand zum Rand
            let newX = Math.random() * (viewportWidth - noButton.offsetWidth - 100) + 50;
            let newY = Math.random() * (viewportHeight - noButton.offsetHeight - 100) + 50;

            // Bewegt den Button an die neue Position (absolut zum Viewport)
            noButton.style.left = `${newX}px`;
            noButton.style.top = `${newY}px`;
        });
    </script>

</body>
</html>
